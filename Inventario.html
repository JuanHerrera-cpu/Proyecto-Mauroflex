<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario - Mauroflex</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f0f8ff;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
        }

        h1 {
            text-align: center;
            color: #803F92;
        }

        h3 {
            color: #803F92;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }

        button {
            margin-top: 10px;
            padding: 10px;
            width: 100%;
            background-color: #803F92;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #6a3278;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            border: 1px solid #c5cae9;
            text-align: left;
        }

        th {
            background-color: #803F92;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #e8eaf6;
        }

        .stock-bajo {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Inventario de Productos - Mauroflex</h1>

    <h3>Agregar Producto</h3>

    <input type="text" id="producto" placeholder="Nombre del producto">
    <input type="number" id="stock" placeholder="Cantidad en stock">
    <input type="number" id="precio" placeholder="Precio">

    <button onclick="agregarProducto()">Agregar</button>

    <table>
        <thead>
            <tr>
                <th>Producto</th>
                <th>Stock</th>
                <th>Precio Unitario</th>
            </tr>
        </thead>
        <tbody id="tablaInventario">
        </tbody>
    </table>

</div>

<!-- Conexión con JavaScript -->
<script src="inventario.js"></script>

</body>
</html>
