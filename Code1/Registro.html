<!DOCTYPE html>
<html lang="en">
<head>
   <style>
    body{
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }
  </style>
  
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h3>REGISTRO DE USUARIO</h3>
  <img src="../imag/logo.jpeg" width="180">
 <form id="formRegistro">

  <label>Nombres</label><br>
  <input type="text" id="nombres" required><br><br>

  <label>Apellidos</label><br>
  <input type="text" id="apellidos" required><br><br>

  <label>Tipo de documento</label><br>
<select id="tipoDocumento" required>
  <option value="">Seleccione...</option>
  <option value="CC">Cédula de ciudadanía</option>
  <option value="NIT">NIT</option>
  <option value="CE">Cédula extranjera</option>
</select><br><br>

<label>Número de documento</label><br>
<input type="text" id="documento" pattern="[0-9]+" inputmode="numeric" required><br><br>


  <label>Correo electronico</label><br>
  <input type="email" id="correo" required><br><br>

  <label>Contraseña</label><br> 
  <input type="password" id="password" required><br><br>

  <label>Confirmar contraseña</label><br>
  <input type="password" id="confirmPassword" required><br><br>

  <button type="submit">Enviar</button>

  <div id="error"></div>

</form>
<script src="registro.js"></script>
</body>
</html>
